name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (base + dev only — camera/mmwave/mqtt/genai stay lazy)
        run: pip install -e "backend[dev]"
      - name: Run suite
        run: python -m pytest backend/tests -q
