<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wavr Desktop</title>
    <style>
      html, body {
        height: 100%; margin: 0;
        background: #0b0f0e; color: #d7e0dc;
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.1rem;
      }
      .dot {
        width: 12px; height: 12px; border-radius: 50%;
        background: #34d399; box-shadow: 0 0 0 0 rgba(52,211,153,.7);
        animation: pulse 1.6s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(52,211,153,.55); }
        70% { box-shadow: 0 0 0 14px rgba(52,211,153,0); }
        100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
      }
      h1 { font-size: 1.15rem; font-weight: 600; margin: 0; letter-spacing: .01em; }
      p { margin: 0; color: #8fa39c; font-size: .9rem; }
    </style>
  </head>
  <body>
    <!-- Shown for ~1-2s while the shell starts the backend, then the Rust navigates this
         window to http://127.0.0.1:8000 (the live dashboard). See src/main.rs. -->
    <div class="wrap">
      <div class="dot"></div>
      <h1>Starting Wavr…</h1>
      <p>Bringing the central online.</p>
    </div>
  </body>
</html>
