; Wavr sensor node - PlatformIO project.
; First target board: any ESP32 Dev Module (WROOM-32) + HLK-LD2450 mmWave
; radar. See ../README.md for the flash + wiring walkthrough and
; ../NODE_PROTOCOL.md for the wire contract this firmware speaks.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0
build_flags =
    -D WAVR_FW_VERSION=\"1.0.0\"

; Optional: build a PIR node instead of the default LD2450 build. Flash with
;   pio run -e esp32dev-pir -t upload
; and declare sensor_type "pir" (not "ld2450") when minting the node's
; enrollment code in Wavr.
[env:esp32dev-pir]
extends = env:esp32dev
build_flags =
    -D WAVR_FW_VERSION=\"1.0.0\"
    -D WAVR_SENSOR_DRIVER=WAVR_SENSOR_PIR

; Local-network OTA upload (ArduinoOTA/espota) for a node that already has a
; build on it from a USB flash. Set upload_port to the node's current LAN IP
; (or its mDNS-ish OTA hostname if your network resolves it) before using
; this, and keep --auth in sync with WAVR_OTA_PASSWORD in include/config.h.
;   pio run -e esp32dev-ota -t upload
[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.1.0
upload_flags =
    --auth=wavr-node-ota
