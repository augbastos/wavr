<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f1216">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%230f1216'/%3E%3Cpath d='M3 10c1.5-4 2.5-4 4 0s2.5 4 4 0 2-3 2-3' stroke='%233db54a' stroke-width='1.6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<meta name="description" content="Wavr — sensoriamento residencial multi-modal com fusão explicável por cômodo.">
<!-- PWA: installable app shell. All refs are same-origin relative files (no CDN, no external requests). -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wavr">
<title>Wavr — Fused Home Sensing</title>
<style>
  :root{--bg:#0f1216;--surface:#171c22;--ink:#e8edf2;--muted:#9aa7b4;
        --accent:#3db54a;--warn:#e0b341;--danger:#c65b52;--zone:#6ea8fe;
        --line:#232a32;--radius:14px;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  header{padding:20px 24px;border-bottom:1px solid var(--line);
         display:flex;align-items:center;justify-content:space-between;gap:10px 16px;flex-wrap:wrap;}
  h1{font-size:1.25rem;margin:0;letter-spacing:-0.01em;}
  .mode{font-size:.8rem;color:var(--muted);}
  .mode b{color:var(--accent);}
  .hdr-right{display:flex;align-items:center;gap:14px;}
  .house{font-size:.8rem;font-weight:600;padding:4px 12px;border-radius:999px;border:1px solid var(--line);}
  .house.home{color:var(--accent);border-color:var(--accent);}
  .house.away{color:var(--muted);}
  .narrate:not([hidden]){display:flex;align-items:flex-start;gap:14px;padding:12px 24px;border-bottom:1px solid var(--line);}
  .narrate-out{margin:0;font-size:.9rem;color:var(--ink);max-width:70ch;line-height:1.5;}
  .narrate-out.muted{color:var(--muted);}
  main{padding:24px;max-width:1000px;margin:0 auto;}
  .rooms{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .card h2{margin:0 0 4px;font-size:1rem;text-transform:capitalize;}
  .conf{font-variant-numeric:tabular-nums;font-size:.82rem;color:var(--muted);}
  .pill{display:inline-block;font-size:.75rem;padding:3px 10px;border-radius:999px;margin:8px 0;}
  .pill.on{background:rgba(61,181,74,.15);color:var(--accent);}
  .pill.off{background:rgba(154,167,180,.12);color:var(--muted);}
  .bar{height:8px;border-radius:4px;background:var(--line);overflow:hidden;margin:6px 0 12px;}
  .bar>i{display:block;height:100%;background:var(--accent);width:100%;
         transform:scaleX(0);transform-origin:left;transition:transform .3s ease-out;}
  .src{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);
       padding:3px 0;border-top:1px dashed var(--line);}
  .src .m{text-transform:capitalize;color:var(--ink);}
  .vit{margin-top:10px;font-size:.82rem;font-variant-numeric:tabular-nums;}
  h3{margin:28px 0 12px;font-size:.9rem;color:var(--muted);font-weight:600;}
  .timeline{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
            padding:8px 0;max-height:260px;overflow:auto;}
  .row{display:flex;gap:14px;padding:7px 18px;font-size:.82rem;border-bottom:1px solid var(--line);
       font-variant-numeric:tabular-nums;}
  .row:last-child{border-bottom:0;}
  .row .t{color:var(--muted);min-width:88px;}
  .row .r{text-transform:capitalize;min-width:80px;}
  .controls:not([hidden]){display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:12px 24px;border-bottom:1px solid var(--line);}
  .ctl{background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:.8rem;cursor:pointer;
       transition:border-color .15s ease-out,color .15s ease-out;}
  .ctl:hover{border-color:var(--muted);}
  .ctl.on{border-color:var(--accent);color:var(--accent);}
  .ctl.off{color:var(--muted);}
  .ctl.small{padding:6px 12px;font-size:.78rem;}
  .ctl:disabled{opacity:.6;cursor:default;}
  .src-toggles{display:flex;gap:8px;flex-wrap:wrap;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .empty{color:var(--muted);font-size:.82rem;padding:14px 18px;}
  .cams:not([hidden]){padding:12px 24px;border-bottom:1px solid var(--line);}
  .cams h3{margin:4px 0 12px;}
  .radar{padding:12px 24px;border-bottom:1px solid var(--line);}
  .radar h3{margin:4px 0 12px;}
  #radar{width:100%;max-width:760px;display:block;background:var(--surface);
         border:1px solid var(--line);border-radius:var(--radius);}
  .radar-room{fill:none;stroke:var(--line);stroke-width:.025;vector-effect:non-scaling-stroke;}
  .radar-room.occ{fill:rgba(61,181,74,.08);stroke:var(--accent);}
  .radar-roomlabel{fill:var(--muted);font-size:.24px;text-transform:capitalize;}
  .radar-dot{fill:var(--accent);}
  .radar-target{transition:transform .25s cubic-bezier(.22,1,.36,1);}
  .radar-posture{fill:var(--muted);font-size:.28px;text-anchor:middle;}
  .cam-form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .cam-form input{background:var(--surface);color:var(--ink);border:1px solid var(--line);
                  border-radius:8px;padding:8px 11px;font-size:.82rem;}
  .cam-form input::placeholder{color:var(--muted);opacity:1;}
  .cam-form input[name="rtsp_url"]{flex:1;min-width:220px;}
  .cam-form input[name="confidence"]{width:88px;}
  .cam-list{display:flex;flex-direction:column;gap:6px;}
  .cam-row{display:flex;justify-content:space-between;align-items:center;gap:12px;
           font-size:.82rem;padding:8px 0;border-top:1px dashed var(--line);}
  .cam-row>span{min-width:0;overflow-wrap:anywhere;}
  .cam-row .rm{flex-shrink:0;background:none;border:1px solid var(--line);color:var(--muted);
               border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.75rem;
               transition:border-color .15s ease-out,color .15s ease-out;}
  .cam-row .rm:hover{border-color:var(--warn);color:var(--warn);}
  /* Wavr Net panel (live-only): device inventory + rogue alerts */
  .net:not([hidden]){padding:12px 24px;border-bottom:1px solid var(--line);}
  .net h3{margin:4px 0 10px;}
  .net-hint{color:var(--muted);font-size:.82rem;padding:6px 0;}
  .net-cols{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
  .net-col h4{margin:0 0 6px;font-size:.72rem;color:var(--muted);font-weight:600;
              text-transform:uppercase;letter-spacing:.05em;}
  .dev-list,.alert-list{display:flex;flex-direction:column;max-height:250px;overflow:auto;}
  .dev-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;
           font-size:.82rem;padding:7px 0;border-top:1px dashed var(--line);}
  .dev-row>span:first-child{min-width:0;overflow-wrap:anywhere;}
  .dev-meta{color:var(--muted);font-variant-numeric:tabular-nums;}
  .mac{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--muted);}
  .tag{flex-shrink:0;font-size:.7rem;padding:2px 9px;border-radius:999px;border:1px solid var(--line);}
  .tag.known{color:var(--accent);border-color:rgba(61,181,74,.4);}
  .tag.unknown{color:var(--warn);border-color:rgba(224,179,65,.45);}
  .alert-row{font-size:.8rem;padding:7px 0;border-top:1px dashed var(--line);}
  .alert-row .at{color:var(--danger);font-weight:600;}
  .alert-row .ameta{color:var(--muted);font-variant-numeric:tabular-nums;
                    display:block;margin-top:2px;overflow-wrap:anywhere;}
  /* per-source freshness (health/age_s) in the room-card "why" rows */
  .src.stale{opacity:.62;}
  .src.dead{opacity:.5;}
  .src.dead span{text-decoration:line-through;}
  .src .h{display:inline-block;width:6px;height:6px;border-radius:50%;
          margin-right:6px;vertical-align:middle;background:var(--muted);}
  .src .h.stale{background:var(--warn);}
  .src .h.dead{background:var(--danger);}
  /* Zone editor (radar overlay) */
  .zonebar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px;}
  .zonehint{color:var(--muted);font-size:.8rem;}
  .zonepanel{margin-top:10px;}
  .zone-name:not([hidden]){display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .zone-name input{background:var(--surface);color:var(--ink);border:1px solid var(--line);
                   border-radius:8px;padding:8px 11px;font-size:.82rem;min-width:200px;flex:1;}
  .zone-name input::placeholder{color:var(--muted);opacity:1;}
  .zone-list{display:flex;flex-direction:column;}
  .zone-empty{color:var(--muted);font-size:.8rem;padding:4px 0;}
  .zone-item{display:flex;justify-content:space-between;align-items:center;gap:12px;
             font-size:.82rem;padding:7px 0;border-top:1px dashed var(--line);}
  .zone-item .zi{display:flex;gap:10px;align-items:baseline;min-width:0;overflow-wrap:anywhere;}
  .zone-item .zocc{color:var(--accent);font-size:.75rem;white-space:nowrap;}
  .zone-item .zempty{color:var(--muted);font-size:.75rem;white-space:nowrap;}
  .zone-item .rm{flex-shrink:0;background:none;border:1px solid var(--line);color:var(--muted);
                 border-radius:8px;padding:5px 11px;cursor:pointer;font-size:.75rem;
                 transition:border-color .15s ease-out,color .15s ease-out;}
  .zone-item .rm:hover{border-color:var(--warn);color:var(--warn);}
  .radar-zone{fill:rgba(110,168,254,.06);stroke:var(--zone);stroke-width:.02;
              stroke-dasharray:.1 .08;vector-effect:non-scaling-stroke;pointer-events:none;
              transition:fill .25s ease-out;}
  .radar-zone.occ{fill:rgba(110,168,254,.2);stroke-dasharray:none;}
  .radar-zonelabel{fill:var(--zone);font-size:.22px;pointer-events:none;}
  .radar-draw{fill:rgba(61,181,74,.1);stroke:var(--accent);stroke-width:.02;
              stroke-dasharray:.12 .08;vector-effect:non-scaling-stroke;pointer-events:none;}
  #radar.editing{cursor:crosshair;touch-action:none;}
  @media (prefers-reduced-motion:reduce){.bar>i,.ctl,.cam-row .rm,.zone-item .rm,.radar-target,.radar-zone{transition:none;}}
</style>
</head>
<body>
<header><h1>Wavr</h1>
  <div class="hdr-right">
    <span id="house" class="house" aria-live="polite"></span>
    <div class="mode" id="mode"></div>
  </div>
</header>
<div id="controls" class="controls" hidden>
  <button id="sysToggle" class="ctl"></button>
  <div id="srcToggles" class="src-toggles"></div>
</div>
<div id="cameras" class="cams" hidden>
  <h3 id="cams-h">Câmeras</h3>
  <form id="camForm" class="cam-form" aria-labelledby="cams-h">
    <input name="name" placeholder="nome (ex: cam_sala)" required aria-label="nome da câmera">
    <input name="room" placeholder="cômodo (ex: sala)" required aria-label="cômodo">
    <input name="rtsp_url" placeholder="rtsp://user:senha@ip:554/stream" required aria-label="URL RTSP">
    <input name="confidence" type="number" step="0.05" min="0" max="1" value="0.4" aria-label="confiança mínima" title="confiança mínima de detecção (0–1)">
    <button type="submit" class="ctl">Adicionar</button>
  </form>
  <div id="camList" class="cam-list"></div>
</div>
<div id="narrate" class="narrate" hidden>
  <button id="narrateBtn" class="ctl">Narrar</button>
  <p id="narrateOut" class="narrate-out" aria-live="polite"></p>
</div>
<div id="network" class="net" hidden>
  <h3>Wavr Net</h3>
  <div id="netHint" class="net-hint">Wavr Net desligado — inicie o backend com WAVR_NET_INVENTORY=1</div>
  <div class="net-cols">
    <div class="net-col">
      <h4>Dispositivos na rede</h4>
      <div id="devList" class="dev-list" aria-live="polite"></div>
    </div>
    <div class="net-col">
      <h4>Alertas de intrusão</h4>
      <div id="alertList" class="alert-list" aria-live="polite"></div>
    </div>
  </div>
</div>
<div id="radarWrap" class="radar"><h3 id="radar-h">Radar</h3>
  <svg id="radar" role="img" aria-labelledby="radar-h" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="zoneBar" class="zonebar">
    <button id="zoneEdit" type="button" class="ctl small">Editar zonas</button>
    <span id="zoneHint" class="zonehint" hidden>arraste sobre o radar para desenhar uma zona</span>
  </div>
  <div id="zonePanel" class="zonepanel" hidden>
    <form id="zoneNameForm" class="zone-name" hidden>
      <input id="zoneNameInput" placeholder="nome da zona (ex: sofá)" aria-label="nome da zona" maxlength="40" autocomplete="off">
      <button type="submit" class="ctl small">Salvar</button>
      <button type="button" id="zoneCancel" class="ctl small off">Cancelar</button>
    </form>
    <div id="zoneList" class="zone-list" aria-label="Zonas"></div>
  </div>
</div>
<main>
  <div class="rooms" id="rooms" aria-label="Estado por cômodo"><div class="empty">aguardando dados dos cômodos…</div></div>
  <h3 id="tl-h">Timeline</h3>
  <div class="timeline" id="timeline" role="log" aria-labelledby="tl-h"><div class="empty">sem eventos ainda</div></div>
</main>
<script>
// ---- DataProvider contract: { start(onEvent), history() } — items are RoomState dicts ----
function WebSocketProvider(){
  const base = location.origin;
  return {
    async history(){ try{ const r=await fetch(base+"/api/history?limit=100"); return await r.json(); }catch{ return []; } },
    start(onEvent){
      const ws = new WebSocket(base.replace(/^http/,"ws")+"/ws/live");
      ws.onmessage = (m)=> onEvent(JSON.parse(m.data));
      ws.onclose = ()=> setTimeout(()=> this.start(onEvent), 1500);
    },
  };
}
function SimulatorProvider(){
  // Fictional multi-modal apartment producing RoomState directly (no backend).
  const rooms = {
    casa:    [["network"]],
    sala:    [["wifi_csi"]],
    quarto:  [["wifi_csi"],["camera"]],
    quintal: [["camera"]],
  };
  // Trust weights per modality — mirror backend FusionEngine DEFAULT_WEIGHTS.
  const W = {camera:1.0, wifi_csi:0.85, network:0.5, sim:0.6};
  let tick = 0;
  function stateFor(room){
    const mods = rooms[room];
    // Mirror the real engine: confidence = agreement × strength, so a lone coarse
    // source (e.g. network) can never read 100% — same math the backend uses.
    let num=0, den=0, strength=0; const sources=[]; let vitals={}; let hasTarget=false;
    mods.forEach(([m],i)=>{
      const present = ((tick+i)%7)<4;
      const conf = present ? 0.9 : 0.2;      // detector's own confidence (independent of trust weight)
      const mass = W[m]*conf;
      den += mass;
      if(present){ num += mass; strength = Math.max(strength, mass); }
      // Demo-only source freshness so the health/age indicator is visible without a
      // backend — mirrors fusion.py's fresh(<=30s)/stale/dead(>=90s) bands. Display
      // only: age doesn't feed the confidence math above (same as the real engine's
      // decay is applied to trust, not shown here).
      const age_s = ((tick + i*5) % 15) * 8;   // 0..112s, cycles through the bands
      const health = age_s <= 30 ? "fresh" : age_s >= 90 ? "dead" : "stale";
      sources.push({modality:m, presence:present, confidence:+conf.toFixed(3), age_s, health});
      if(present && m==="wifi_csi") vitals={breathing_bpm:+(12+3*Math.sin(tick/5)).toFixed(1), heart_bpm:+(60+10*Math.sin(tick/4)).toFixed(0)};
      if(present && (m==="wifi_csi"||m==="camera")) hasTarget = true;
    });
    const agreement = den>0 ? num/den : 0;
    const confidence = +(agreement*strength).toFixed(3);
    const parts = sources.map(s=> `${s.modality}: ${s.presence?"presente":"vazio"}`);
    // Same deterministic ellipse walk + posture cycle as the Python SimulatedSource,
    // so the public demo shows a moving radar target (id=1) with no real data.
    const posture = ["walking","standing","sitting"][Math.floor(tick/5)%3];
    const targets = hasTarget ? [{
      id:1, x:+(2.0+1.6*Math.sin(tick/4)).toFixed(2), y:+(1.5+1.1*Math.cos(tick/4)).toFixed(2),
      z:null, posture, velocity: posture==="walking" ? 0.5 : 0.0, confidence:0.9,
    }] : [];
    return {room, occupied:confidence>=0.5, confidence, vitals, sources, targets,
            explanation: parts.join(" · ")+` → ${Math.round(confidence*100)}% ocupado`,
            ts:new Date().toISOString()};
  }
  const all = ()=> Object.keys(rooms).map(stateFor);
  return {
    async history(){ const out=[]; for(let t=0;t<12;t++){ tick=t; out.push(...all()); } tick=12; return out; },
    start(onEvent){ setInterval(()=>{ all().forEach(onEvent); tick++; }, 1500); },
  };
}

// ---- Mode selection (PRIVACY: never "live" off localhost) ----
const MODE = (location.hostname==="localhost"||location.hostname==="127.0.0.1") ? "live" : "simulated";
const provider = MODE==="live" ? WebSocketProvider() : SimulatorProvider();
document.getElementById("mode").innerHTML = MODE==="live"
  ? "fonte: <b>casa real</b> (local)" : "fonte: <b>demo</b> (dados fictícios)";

// ---- House indicator (home/away) — works in both live and demo modes ----
const houseEl = document.getElementById("house");
const roomOcc = {};
function updateHouse(rs){
  roomOcc[rs.room] = !!rs.occupied;
  const home = Object.values(roomOcc).some(Boolean);
  houseEl.textContent = home ? "casa: alguém em casa" : "casa: vazia";
  houseEl.className = "house " + (home ? "home" : "away");
}

// ---- Control plane (Plano A / live only): global on/off + per-source on/off ----
async function renderControls(){
  if(MODE!=="live") return;               // the control plane is a backend feature
  document.getElementById("controls").hidden = false;
  const post = (url,body)=> fetch(location.origin+url,{method:"POST",
    headers:{"Content-Type":"application/json","X-Wavr-Local":"1"}, body:JSON.stringify(body)})
    .catch(()=>{});  // rede local pode falhar momentaneamente; o refresh() seguinte re-sincroniza
  async function refresh(){
    let s; try{ s = await (await fetch(location.origin+"/api/system")).json(); }catch{ return; }
    const sys = document.getElementById("sysToggle");
    sys.textContent = s.running ? "Sistema: LIGADO" : "Sistema: DESLIGADO";
    sys.className = "ctl " + (s.running ? "on" : "off");
    sys.onclick = async ()=>{ await post("/api/system/toggle",{on:!s.running}); refresh(); };
    const wrap = document.getElementById("srcToggles"); wrap.innerHTML = "";
    s.sources.forEach(src=>{
      const b = document.createElement("button");
      b.className = "ctl small " + (src.enabled ? "on" : "off");
      b.textContent = `${src.name}: ${src.enabled ? "on" : "off"}`;
      b.onclick = async ()=>{ await post(`/api/sources/${src.name}/toggle`,{enabled:!src.enabled}); refresh(); };
      wrap.appendChild(b);
    });
  }
  refresh(); setInterval(refresh, 3000);
}
renderControls();

// ---- Camera management (Plano A / live only) ----
async function renderCameras(){
  if(MODE!=="live") return;                 // live-only; never in Plano B
  document.getElementById("cameras").hidden = false;
  const post = (url,body)=> fetch(location.origin+url,{method:"POST",
    headers:{"Content-Type":"application/json","X-Wavr-Local":"1"}, body:JSON.stringify(body)});
  async function refresh(){
    let cams; try{ cams = await (await fetch(location.origin+"/api/cameras")).json(); }catch{ return; }
    const list = document.getElementById("camList");
    list.innerHTML = cams.length ? "" : `<div class="empty">nenhuma câmera configurada</div>`;
    cams.forEach(c=>{
      const row = document.createElement("div"); row.className="cam-row";
      const label = document.createElement("span");
      const nameEl = document.createElement("b"); nameEl.textContent = c.name;
      const confEl = document.createElement("span"); confEl.className = "conf"; confEl.textContent = c.rtsp_url;
      label.appendChild(nameEl);
      label.appendChild(document.createTextNode(` · ${c.room} · `));
      label.appendChild(confEl);
      row.appendChild(label);
      const rm = document.createElement("button"); rm.className="rm"; rm.textContent="Remover";
      rm.onclick = async ()=>{ await fetch(location.origin+`/api/cameras/${encodeURIComponent(c.name)}`,
        {method:"DELETE", headers:{"X-Wavr-Local":"1"}}).catch(()=>{}); refresh(); };
      row.appendChild(rm); list.appendChild(row);
    });
  }
  document.getElementById("camForm").onsubmit = async (e)=>{
    e.preventDefault();
    const f = e.target;
    await post("/api/cameras", {
      name: f.name.value, room: f.room.value, rtsp_url: f.rtsp_url.value,
      confidence: parseFloat(f.confidence.value),
    }).catch(()=>{});
    f.reset(); f.confidence.value = "0.4"; refresh();
  };
  refresh();
}
renderCameras();

// ---- Narration (Plano A / live only) ----
function renderNarrate(){
  if(MODE!=="live") return;                 // narration hits the backend/cloud; never in Plano B
  document.getElementById("narrate").hidden = false;
  const btn = document.getElementById("narrateBtn");
  const out = document.getElementById("narrateOut");
  btn.onclick = async ()=>{
    btn.disabled = true; out.className = "narrate-out muted"; out.textContent = "gerando resumo…";
    try{
      const r = await fetch(location.origin+"/api/narrate",{method:"POST",headers:{"X-Wavr-Local":"1"}});
      if(r.status===503){ out.textContent = "narração não configurada (defina GEMINI_API_KEY + WAVR_NARRATE_ENABLED)"; }
      else if(!r.ok){ out.textContent = "erro ao gerar narração"; }
      else { const d = await r.json(); out.className = "narrate-out"; out.textContent = d.narration || "(sem resposta)"; }
    }catch{ out.textContent = "falha de conexão"; }
    finally{ btn.disabled = false; }
  };
}
renderNarrate();

// ---- Wavr Net panel (Plano A / live only): device inventory + rogue alerts ----
function maskMac(mac){
  // Show the vendor-OUI half, mask the device-specific half (privacy).
  if(typeof mac!=="string" || !mac) return "—";
  const p = mac.split(":");
  if(p.length===6) return p.slice(0,3).join(":")+":··:··:··";
  const keep = Math.max(2, Math.ceil(mac.length/2));
  return mac.slice(0,keep) + "·".repeat(Math.max(2, mac.length-keep));
}
function renderNetwork(){
  if(MODE!=="live") return;                 // Wavr Net reads the local backend; never in Plano B (demo)
  document.getElementById("network").hidden = false;
  const devList = document.getElementById("devList");
  const alertList = document.getElementById("alertList");
  const hint = document.getElementById("netHint");
  async function refresh(){
    let inv, al;
    try{
      inv = await (await fetch(location.origin+"/api/inventory")).json();
      al  = await (await fetch(location.origin+"/api/alerts")).json();
    }catch{ return; }                       // backend momentarily unreachable — keep last view
    const devices = Array.isArray(inv && inv.devices) ? inv.devices : [];
    const rogue   = Array.isArray(al && al.alerts)   ? al.alerts    : [];
    // Inventory is opt-in (WAVR_NET_INVENTORY=1); an empty list means it isn't collecting.
    hint.hidden = devices.length > 0;
    devList.textContent = "";
    devices.forEach(d => {
      const row = document.createElement("div"); row.className = "dev-row";
      const left = document.createElement("span");
      const main = document.createElement("span");
      main.textContent = (d.vendor || "desconhecido") + " · " + (d.device_type || "?");
      const meta = document.createElement("span"); meta.className = "dev-meta";
      meta.textContent = " · " + (d.ip || "sem ip") + " · ";
      const mac = document.createElement("span"); mac.className = "mac";
      mac.textContent = maskMac(d.mac);      // textContent only — never innerHTML with device data
      left.appendChild(main); left.appendChild(meta); left.appendChild(mac);
      const tag = document.createElement("span");
      tag.className = "tag " + (d.known ? "known" : "unknown");
      tag.textContent = d.known ? "conhecido" : "desconhecido";
      row.appendChild(left); row.appendChild(tag);
      devList.appendChild(row);
    });
    // Rogue alerts newest first (service returns newest last; ISO ts sorts lexicographically).
    rogue.sort((a,b) => String(b.ts||"").localeCompare(String(a.ts||"")));
    alertList.textContent = "";
    if(!rogue.length){
      const e = document.createElement("div"); e.className = "net-hint";
      e.textContent = "nenhum dispositivo desconhecido recente";
      alertList.appendChild(e);
    } else rogue.forEach(a => {
      const row = document.createElement("div"); row.className = "alert-row";
      const at = document.createElement("span"); at.className = "at";
      const when = (typeof a.ts==="string" && a.ts.length>=19) ? a.ts.slice(11,19) : (a.ts || "");
      at.textContent = "novo dispositivo" + (when ? " " + when : "");
      const meta = document.createElement("span"); meta.className = "ameta";
      meta.textContent = [a.vendor||"desconhecido", a.device_type||"?",
                          a.ip||"sem ip", maskMac(a.mac), a.hostname||""]
                          .filter(Boolean).join(" · ");
      row.appendChild(at); row.appendChild(meta);
      alertList.appendChild(row);
    });
  }
  refresh(); setInterval(refresh, 15000);
}
renderNetwork();

// ---- Radar (top-down house map + live/demo targets; works in both modes) ----
const SVG_NS = "http://www.w3.org/2000/svg";
const POSTURE_LABEL = {walking:"andando", standing:"em pé", sitting:"sentado", lying:"deitado"};
let radarUpdate = null;

// ---- Zones (client-side, persisted to localStorage; works in live AND demo) ----
// A zone is a named rectangle in radar user-space (metres, same coords as rooms/targets).
const ZONE_KEY = "wavr.zones.v1";
const isZone = (z) => z && typeof z.name==="string" &&
  ["x","y","w","h"].every(k => typeof z[k]==="number" && isFinite(z[k]));
function loadZones(){
  try{ const z = JSON.parse(localStorage.getItem(ZONE_KEY)); return Array.isArray(z) ? z.filter(isZone) : []; }
  catch{ return []; }
}
function saveZones(zones){ try{ localStorage.setItem(ZONE_KEY, JSON.stringify(zones)); }catch{} }
let zones = loadZones();

function dot(room, t){
  const g = document.createElementNS(SVG_NS, "g");
  g.setAttribute("class", "radar-target");
  const c = document.createElementNS(SVG_NS, "circle");
  c.setAttribute("class", "radar-dot");
  c.setAttribute("cx", 0); c.setAttribute("cy", 0); c.setAttribute("r", 0.12);
  c.appendChild(document.createElementNS(SVG_NS, "title"));
  const txt = document.createElementNS(SVG_NS, "text");
  txt.setAttribute("class", "radar-posture");
  g.appendChild(c); g.appendChild(txt);
  placeDot(g, room, t);   // position set before insertion -> no fly-in on first paint
  return g;
}

function placeDot(g, room, t){
  const r = 0.12;
  let x = t.x != null ? room.x + t.x : room.x + room.w/2;
  let y = t.y != null ? room.y + t.y : room.y + room.h/2;
  x = Math.min(Math.max(x, room.x + r), room.x + room.w - r);
  y = Math.min(Math.max(y, room.y + r), room.y + room.h - r);
  // CSS px == SVG user units here; style.transform (not the attribute) so the
  // .radar-target transition animates movement between updates.
  g.style.transform = `translate(${x}px, ${y}px)`;
  g.querySelector("title").textContent =
    `alvo ${t.id ?? "?"} · confiança ${Math.round((t.confidence ?? 0)*100)}%`;
  const txt = g.querySelector("text");
  const label = POSTURE_LABEL[t.posture];
  if(label){
    // Flip the caption above the dot when it sits in the lower half of the room, so the
    // baseline never lands on (or past) the viewBox's bottom edge and clips descenders.
    const ly = (y - room.y) > room.h/2 ? -0.24 : 0.32;
    // text-anchor is "middle"; clamp the label's x independently of the dot's so a wide
    // word (e.g. "andando") can't overflow the room/viewBox on either side near a corner.
    const half = label.length*0.085 + 0.05;
    const lo = room.x + half, hi = room.x + room.w - half;
    const lx = lo <= hi ? Math.min(Math.max(x, lo), hi) : room.x + room.w/2;
    txt.setAttribute("x", lx - x); txt.setAttribute("y", ly);   // coords relative to the g
    txt.textContent = label;
  } else {
    txt.textContent = "";
  }
}

async function renderRadar(){
  let map;
  if(MODE==="live"){ try{ map = await (await fetch(location.origin+"/api/house")).json(); }catch{} }
  map = map || {rooms:[{name:"sala",x:0,y:0,w:4,h:3},{name:"quarto",x:4.2,y:0,w:3.5,h:3},
                       {name:"quintal",x:0,y:3.2,w:7.7,h:2.5}]};   // demo default = backend DEFAULT_MAP
  const svg = document.getElementById("radar");
  const W = Math.max(...map.rooms.map(r=>r.x+r.w)), H = Math.max(...map.rooms.map(r=>r.y+r.h));
  // Bottom margin is larger than the other sides as a second safety net (on top of the
  // dot()-level label flip/clamp above) for posture-caption footprint near room edges.
  svg.setAttribute("viewBox", `-0.2 -0.2 ${W+0.4} ${H+0.8}`);
  const roomIdx = {};
  map.rooms.forEach(r=>{
    const g = document.createElementNS(SVG_NS, "g");
    const rect = document.createElementNS(SVG_NS, "rect");
    rect.setAttribute("class", "radar-room");
    rect.setAttribute("x", r.x); rect.setAttribute("y", r.y);
    rect.setAttribute("width", r.w); rect.setAttribute("height", r.h);
    const label = document.createElementNS(SVG_NS, "text");
    label.setAttribute("class", "radar-roomlabel");
    label.setAttribute("x", r.x + 0.15); label.setAttribute("y", r.y + 0.35);
    label.textContent = r.name;
    const layer = document.createElementNS(SVG_NS, "g");
    g.appendChild(rect); g.appendChild(label); g.appendChild(layer);
    svg.appendChild(g);
    roomIdx[r.name] = {r, rect, layer, dots: new Map()};
  });
  // ---- Zone editor overlay (draw/name/delete rectangles; label occupied zones) ----
  // zoneLayer goes UNDER the room groups so live target dots always stay on top;
  // drawLayer goes on top so the in-progress rectangle is visible while dragging.
  const zoneLayer = document.createElementNS(SVG_NS, "g");
  svg.insertBefore(zoneLayer, svg.firstChild);
  const drawLayer = document.createElementNS(SVG_NS, "g");
  svg.appendChild(drawLayer);
  const liveTargets = {};                 // room -> [{x,y}] absolute, latest fusion frame
  const zoneEditBtn = document.getElementById("zoneEdit");
  const zoneHintEl  = document.getElementById("zoneHint");
  const zonePanel   = document.getElementById("zonePanel");
  const zoneListEl  = document.getElementById("zoneList");
  const zoneNameForm  = document.getElementById("zoneNameForm");
  const zoneNameInput = document.getElementById("zoneNameInput");
  let editMode = false, pending = null, previewRect = null, dragStart = null;
  const round2 = (n) => Math.round(n*100)/100;

  function absTargetPoint(room, t){       // mirror placeDot's in-room clamp so zone hit-test matches the dot
    const r = 0.12;
    let x = t.x!=null ? room.x + t.x : room.x + room.w/2;
    let y = t.y!=null ? room.y + t.y : room.y + room.h/2;
    x = Math.min(Math.max(x, room.x + r), room.x + room.w - r);
    y = Math.min(Math.max(y, room.y + r), room.y + room.h - r);
    return {x, y};
  }
  function zoneOccupied(z){
    for(const room in liveTargets)
      for(const p of liveTargets[room])
        if(p.x>=z.x && p.x<=z.x+z.w && p.y>=z.y && p.y<=z.y+z.h) return true;
    return false;
  }
  let zoneRects = [], zoneStatus = [];    // built on zone change; per-frame we only toggle .occ
  function drawZones(){
    zoneLayer.textContent = ""; zoneRects = [];
    zones.forEach((z, i) => {
      const rect = document.createElementNS(SVG_NS, "rect");
      rect.setAttribute("class", "radar-zone");
      rect.setAttribute("x", z.x); rect.setAttribute("y", z.y);
      rect.setAttribute("width", z.w); rect.setAttribute("height", z.h);
      const label = document.createElementNS(SVG_NS, "text");
      label.setAttribute("class", "radar-zonelabel");
      label.setAttribute("x", z.x + 0.12); label.setAttribute("y", z.y + 0.3);
      label.textContent = z.name;         // textContent — no markup injection from a zone name
      zoneLayer.appendChild(rect); zoneLayer.appendChild(label);
      zoneRects[i] = rect;
    });
  }
  function renderZoneList(){
    zonePanel.hidden = !(zones.length || editMode);   // only reveal when there are zones or editing
    zoneListEl.textContent = ""; zoneStatus = [];
    if(!zones.length){
      const e = document.createElement("div"); e.className = "zone-empty";
      e.textContent = editMode ? "arraste sobre o radar para criar uma zona"
                               : "nenhuma zona — clique em “Editar zonas” para criar";
      zoneListEl.appendChild(e); return;
    }
    zones.forEach((z, i) => {
      const item = document.createElement("div"); item.className = "zone-item";
      const info = document.createElement("span"); info.className = "zi";
      const name = document.createElement("span"); name.textContent = z.name;
      const status = document.createElement("span");
      info.appendChild(name); info.appendChild(status);
      item.appendChild(info);
      zoneStatus[i] = status;
      if(editMode){
        const rm = document.createElement("button"); rm.type = "button"; rm.className = "rm";
        rm.textContent = "Remover";
        rm.onclick = () => { zones.splice(i,1); saveZones(zones); refreshZones(); };
        item.appendChild(rm);
      }
      zoneListEl.appendChild(item);
    });
  }
  function updateZoneOcc(){               // per-frame hot path: no DOM rebuild, just toggle occupied
    zones.forEach((z, i) => {
      const occ = zoneOccupied(z);
      if(zoneRects[i]) zoneRects[i].classList.toggle("occ", occ);
      const st = zoneStatus[i];
      if(st){ st.className = occ ? "zocc" : "zempty"; st.textContent = occ ? "• ocupada" : "vazia"; }
    });
  }
  function refreshZones(){ drawZones(); renderZoneList(); updateZoneOcc(); }

  function svgPoint(evt){                  // client px -> radar user-space (metres)
    const ctm = svg.getScreenCTM(); if(!ctm) return null;
    const pt = svg.createSVGPoint(); pt.x = evt.clientX; pt.y = evt.clientY;
    const p = pt.matrixTransform(ctm.inverse());
    return {x: p.x, y: p.y};
  }
  function updatePreview(a, b){
    if(!previewRect) return;
    previewRect.setAttribute("x", Math.min(a.x,b.x)); previewRect.setAttribute("y", Math.min(a.y,b.y));
    previewRect.setAttribute("width", Math.abs(b.x-a.x)); previewRect.setAttribute("height", Math.abs(b.y-a.y));
  }
  function clearPreview(){ if(previewRect){ previewRect.remove(); previewRect = null; } }
  function cancelPending(){ pending = null; clearPreview(); zoneNameForm.hidden = true; }

  svg.addEventListener("pointerdown", (evt) => {
    if(!editMode) return;
    const p = svgPoint(evt); if(!p) return;
    dragStart = p; clearPreview();
    previewRect = document.createElementNS(SVG_NS, "rect");
    previewRect.setAttribute("class", "radar-draw");
    drawLayer.appendChild(previewRect); updatePreview(p, p);
    try{ svg.setPointerCapture(evt.pointerId); }catch{}
    evt.preventDefault();
  });
  svg.addEventListener("pointermove", (evt) => {
    if(!editMode || !dragStart) return;
    const p = svgPoint(evt); if(p) updatePreview(dragStart, p);
  });
  svg.addEventListener("pointerup", (evt) => {
    if(!editMode || !dragStart) return;
    const s = dragStart, p = svgPoint(evt); dragStart = null;
    try{ svg.releasePointerCapture(evt.pointerId); }catch{}
    if(!p){ clearPreview(); return; }
    const x = Math.min(s.x,p.x), y = Math.min(s.y,p.y), w = Math.abs(p.x-s.x), h = Math.abs(p.y-s.y);
    if(w < 0.3 || h < 0.3){ clearPreview(); return; }     // ignore stray clicks / tiny drags
    pending = {x: round2(x), y: round2(y), w: round2(w), h: round2(h)};
    updatePreview(s, p);                                   // keep the preview while naming
    zoneNameForm.hidden = false; zoneNameInput.value = ""; zoneNameInput.focus();
  });
  zoneNameForm.onsubmit = (e) => {
    e.preventDefault(); if(!pending) return;
    const name = ((zoneNameInput.value || "").trim() || ("zona " + (zones.length+1))).slice(0, 40);
    zones.push({id: Date.now(), name, x: pending.x, y: pending.y, w: pending.w, h: pending.h});
    cancelPending(); saveZones(zones); refreshZones();
  };
  document.getElementById("zoneCancel").onclick = cancelPending;
  zoneEditBtn.onclick = () => {
    editMode = !editMode;
    zoneEditBtn.classList.toggle("on", editMode);
    zoneEditBtn.textContent = editMode ? "Concluir edição" : "Editar zonas";
    zoneHintEl.hidden = !editMode;
    svg.classList.toggle("editing", editMode);
    if(!editMode) cancelPending();
    refreshZones();
  };
  refreshZones();

  radarUpdate = (rs)=>{
    const e = roomIdx[rs.room]; if(!e) return;
    e.rect.classList.toggle("occ", !!rs.occupied);
    // Reuse dots keyed by target id so movement TRANSITIONS instead of teleporting
    // (a person walking reads as motion, not a slideshow of positions).
    const seen = new Set();
    (rs.targets||[]).forEach(t=>{
      const key = String(t.id ?? "?");
      seen.add(key);
      const g = e.dots.get(key);
      if(g){ placeDot(g, e.r, t); }
      else { const n = dot(e.r, t); e.dots.set(key, n); e.layer.appendChild(n); }
    });
    [...e.dots.keys()].forEach(k=>{
      if(!seen.has(k)){ e.dots.get(k).remove(); e.dots.delete(k); }
    });
    // Feed absolute target positions to the zone hit-test, then re-highlight zones.
    liveTargets[rs.room] = (rs.targets||[]).map(t => absTargetPoint(e.r, t));
    updateZoneOcc();   // per-frame: only re-highlight (no DOM rebuild); structure rebuilt on zone change
  };
}
renderRadar();

// ---- Rendering (RoomState) ----
const roomsEl = document.getElementById("rooms");
const timelineEl = document.getElementById("timeline");
const cards = {};

function upsert(rs){
  let c = cards[rs.room];
  if(!c){
    roomsEl.querySelector(".empty")?.remove();
    const el = document.createElement("div"); el.className="card";
    el.innerHTML = `<h2>${rs.room}</h2><div class="conf"></div>
      <span class="pill"></span><div class="bar"><i></i></div>
      <div class="srcs"></div><div class="vit"></div>`;
    roomsEl.appendChild(el); c = cards[rs.room] = el;
  }
  c.querySelector(".conf").textContent = `confiança ${Math.round(rs.confidence*100)}%`;
  const pill = c.querySelector(".pill");
  pill.textContent = rs.occupied ? "ocupado" : "vazio";
  pill.className = "pill " + (rs.occupied ? "on" : "off");
  c.querySelector(".bar>i").style.transform = `scaleX(${rs.confidence})`;
  // Per-modality "why" rows. Built with textContent (not innerHTML) so source data
  // can never inject markup, and so a dying source (stale/dead) is visibly flagged.
  const srcs = c.querySelector(".srcs");
  srcs.textContent = "";
  rs.sources.forEach(s => {
    const unhealthy = s.health && s.health !== "fresh";
    const row = document.createElement("div");
    row.className = "src" + (unhealthy ? " " + s.health : "");
    const m = document.createElement("span"); m.className = "m";
    if(unhealthy){                      // muted dot marks a fading/dead source
      const d = document.createElement("i"); d.className = "h " + s.health;
      d.title = s.health === "dead" ? "sem sinal" : "sinal envelhecendo";
      m.appendChild(d);
    }
    m.appendChild(document.createTextNode(s.modality));
    const val = document.createElement("span");
    let txt = (s.presence ? "presente" : "vazio") + " · " + Math.round(s.confidence * 100) + "%";
    if(unhealthy && s.age_s != null) txt += " · " + s.age_s + "s";   // age since last reading
    val.textContent = txt;
    row.appendChild(m); row.appendChild(val);
    srcs.appendChild(row);
  });
  const v = rs.vitals || {};
  const vit = [];
  if(v.breathing_bpm!=null) vit.push(`resp ${v.breathing_bpm} rpm`);
  if(v.heart_bpm!=null) vit.push(`bpm ${v.heart_bpm}`);
  c.querySelector(".vit").textContent = vit.join(" · ");
}

function pushTimeline(rs){
  timelineEl.querySelector(".empty")?.remove();
  const row = document.createElement("div"); row.className="row";
  row.innerHTML = `<span class="t">${rs.ts.slice(11,19)}</span><span class="r">${rs.room}</span>
    <span>${rs.occupied?"ocupado":"vazio"} (${Math.round(rs.confidence*100)}%)</span>`;
  timelineEl.prepend(row);
  while(timelineEl.children.length>60) timelineEl.lastChild.remove();
}

const handle = (rs)=>{ upsert(rs); pushTimeline(rs); updateHouse(rs); radarUpdate?.(rs); };
(async ()=>{ (await provider.history()).forEach(handle); provider.start(handle); })();
</script>
<script>
// ---- PWA: register the shell service worker (offline launch + installable) ----
// Only on secure contexts (HTTPS, or localhost/127.0.0.1) — browsers block SW on plain
// HTTP off-localhost, so this stays silent on the public HTTP demo. The SW is same-origin
// and caches only the static shell, so registration triggers zero external requests.
// Fully guarded so a failure can never break the dashboard or the simulator self-switch.
try {
  if ("serviceWorker" in navigator && window.isSecureContext) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
} catch (e) { /* SW unavailable — dashboard works exactly as before */ }
</script>
